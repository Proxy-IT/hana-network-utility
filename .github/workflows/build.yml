name: Build Hana - Network Utility

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Build Windows installer ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 5

  # ── Build Mac arm64 (Apple Silicon) ────────────────────────────────────────
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac arm64 installer
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer-arm64
          path: dist/*arm64*.dmg
          retention-days: 5

  # ── Build Mac x64 (Intel) ───────────────────────────────────────────────────
  build-mac-x64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac x64 installer
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer-x64
          path: dist/*.dmg
          retention-days: 5

  # ── Create GitHub Release with all installers ───────────────────────────────
  release:
    needs: [build-windows, build-mac-arm64, build-mac-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Download Mac arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer-arm64
          path: dist/mac-arm64

      - name: Download Mac x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer-x64
          path: dist/mac-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hana - Network Utility ${{ github.ref_name }}
          body: |
            ## Hana - Network Utility ${{ github.ref_name }}

            ### Downloads

            **Windows**
            - Download the `.exe` file and run the installer
            - SmartScreen may show a warning — click **More info → Run anyway**

            **Mac — Apple Silicon (M1/M2/M3/M4)**
            - Download the `arm64.dmg` file
            - Open it and drag Hana to Applications
            - Right-click the app → Open on first launch to bypass Gatekeeper

            **Mac — Intel**
            - Download the standard `.dmg` file
            - Open it and drag Hana to Applications
            - Right-click the app → Open on first launch to bypass Gatekeeper

            ---
            No telemetry. No ads. No data collection.
            See [CHANGELOG.md](CHANGELOG.md) for full patch notes.
          files: |
            dist/windows/*.exe
            dist/mac-arm64/*.dmg
            dist/mac-x64/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
