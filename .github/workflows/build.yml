name: Build Hana - Network Utility

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Build Windows installer ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 5

  # ── Build & sign Mac installer ───────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate into a temporary keychain
        env:
          APPLE_CERTIFICATE_BASE64:   ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode the base64 certificate to a .p12 file
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          # Create a temporary, throwaway keychain for this CI run only.
          # Using a random password since it only needs to exist for this job.
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import the certificate + private key
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          # Allow codesign to access the imported key without a GUI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Clean up the .p12 — it's now inside the keychain, no need to keep it on disk
          rm certificate.p12

      - name: Verify the signing identity was imported correctly
        run: |
          echo "Available code signing identities in the keychain:"
          security find-identity -v -p codesigning build.keychain

      - name: Build, sign, and notarize Mac installer
        run: npm run build
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
          # electron-builder reads these two to know notarization is requested
          # CSC_LINK is deliberately NOT set — the certificate is already
          # imported into the CI keychain in the previous step. Setting
          # CSC_LINK to anything (even an empty string) makes electron-builder
          # try to resolve it as a file path, which fails. CSC_IDENTITY_AUTO_DISCOVERY
          # tells it to instead look for a matching identity in the keychain.
          CSC_IDENTITY_AUTO_DISCOVERY:  'true'

      - name: Clean up temporary keychain
        if: always()
        run: security delete-keychain build.keychain || true

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/*.dmg
          retention-days: 5

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hana - Network Utility ${{ github.ref_name }}
          body: |
            ## Hana - Network Utility ${{ github.ref_name }}

            ### Downloads

            **Windows**
            - Download the `.exe` file below and run the installer
            - SmartScreen may show a warning — click **More info → Run anyway**

            **Mac**
            - Download the `.dmg` file below
            - Signed and notarized by Apple — opens normally, no Gatekeeper warning

            ---
            No telemetry. No ads. No data collection.
            See [CHANGELOG.md](CHANGELOG.md) for full patch notes.
          files: |
            dist/windows/*.exe
            dist/mac/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
